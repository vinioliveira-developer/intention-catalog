<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fonte moderna -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Fonte elegante (marca) -->

<body>

          <h1 class="hero-title">
            <span class="light">Vista-se com elegância e propósito</span><br>
            <span class="strong">Intention Store</span>
          </h1>
    
    
          <button class="btn-glass" id="enterCatalogBtn">
            <span class="arrow">&rsaquo;&rsaquo;&rsaquo;</span>
            Ver Catálogo

          </button>
