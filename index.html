<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- META ESSENCIAL -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Catálogo de Tintas | Deposito Neto</title>
  <meta name="description" content="Catálogo online de tintas residenciais e profissionais.">

  <!-- FAVICON -->
  <link rel="icon" href="./assets/images/icon.png">

  <!-- Fontes e Icones -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

<body>
  <div class="app">
    
      <main class="welcome">
    
        <div class="slider">
          <div class="slide first"><img src="assets/images/welcome/house-paint.jpg" alt="Image-house1"></div>
          <div class="slide"><img src="assets/images/welcome/house-blue.png" alt="Image-house2"></div>
          <div class="slide"><img src="assets/images/welcome/house-terra-cota.png" alt="Image-house3"></div>
          <div class="slide"><img src="assets/images/welcome/house-gren.png" alt="Image-house4"></div>
        </div>

        <section class="welcome__content">
    
          <h1 class="hero-title">
            <span class="light">Transforme sua casa <br>com</span>
            <span class="strong">Novas cores!</span>
          </h1>
    
    
          <button class="btn-glass" id="enterCatalogBtn">
            <span class="arrow">&rsaquo;&rsaquo;&rsaquo;</span>
            Ver Catálogo
            <span class="arrow">&lsaquo;&lsaquo;&lsaquo;</span>
    
          </button>
        </section>
      </main>
  </div>

  <script src="./js/pages/welcome.js"></script>
